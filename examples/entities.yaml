---
# API - OpenAPI
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: platform-api
  description: CNOE Platform REST API
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: platform-team
  system: cnoe-platform
  definition: |
    openapi: "3.0.0"
    info:
      title: CNOE Platform API
      version: "1.0.0"
      description: REST API for the CNOE Internal Developer Platform
    servers:
      - url: https://api.cnoe.example.com/v1
    paths:
      /health:
        get:
          summary: Health check
          operationId: getHealth
          responses:
            '200':
              description: Service is healthy
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
      /clusters:
        get:
          summary: List clusters
          operationId: listClusters
          responses:
            '200':
              description: List of managed clusters
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      $ref: '#/components/schemas/Cluster'
        post:
          summary: Create a cluster
          operationId: createCluster
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ClusterInput'
          responses:
            '201':
              description: Cluster created
      /clusters/{id}:
        get:
          summary: Get cluster details
          operationId: getCluster
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Cluster details
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Cluster'
    components:
      schemas:
        Cluster:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            provider:
              type: string
              enum: [aws, gcp, azure]
            status:
              type: string
              enum: [provisioning, running, degraded, deleting]
            region:
              type: string
            nodeCount:
              type: integer
        ClusterInput:
          type: object
          required: [name, provider, region]
          properties:
            name:
              type: string
            provider:
              type: string
              enum: [aws, gcp, azure]
            region:
              type: string
            nodeCount:
              type: integer
              default: 3

---
# API - gRPC
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: cluster-api
  description: Internal gRPC API for cluster management
  tags:
    - grpc
    - internal
spec:
  type: grpc
  lifecycle: production
  owner: infra-team
  system: cnoe-platform
  definition: |
    syntax = "proto3";

    package cnoe.cluster.v1;

    service ClusterService {
      rpc CreateCluster (CreateClusterRequest) returns (Cluster) {};
      rpc GetCluster (GetClusterRequest) returns (Cluster) {};
      rpc ListClusters (ListClustersRequest) returns (ListClustersResponse) {};
      rpc DeleteCluster (DeleteClusterRequest) returns (DeleteClusterResponse) {};
    }

    message CreateClusterRequest {
      string name = 1;
      string provider = 2;
      string region = 3;
      int32 node_count = 4;
    }

    message GetClusterRequest {
      string id = 1;
    }

    message ListClustersRequest {
      int32 page_size = 1;
      string page_token = 2;
    }

    message ListClustersResponse {
      repeated Cluster clusters = 1;
      string next_page_token = 2;
    }

    message DeleteClusterRequest {
      string id = 1;
    }

    message DeleteClusterResponse {}

    message Cluster {
      string id = 1;
      string name = 2;
      string provider = 3;
      string region = 4;
      string status = 5;
      int32 node_count = 6;
    }

